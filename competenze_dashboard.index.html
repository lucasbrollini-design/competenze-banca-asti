<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modello Competenze — Banca di Asti</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E0F14;
  --bg2: #14151C;
  --bg3: #1A1C26;
  --surface: #1F2130;
  --surface2: #252840;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --ink: #F0F2FF;
  --ink2: #9BA3C8;
  --ink3: #5C6490;
  --red: #E85D75;
  --red-dim: rgba(232,93,117,0.15);
  --blue: #5B8AF5;
  --blue-dim: rgba(91,138,245,0.15);
  --green: #4ECBA4;
  --green-dim: rgba(78,203,164,0.15);
  --amber: #F5A623;
  --amber-dim: rgba(245,166,35,0.15);
  --purple: #A78BFA;
  --purple-dim: rgba(167,139,250,0.15);
  --cyan: #22D3EE;
  --cyan-dim: rgba(34,211,238,0.15);
  --pink: #F472B6;
  --pink-dim: rgba(244,114,182,0.15);

  --r: 12px;
  --r-sm: 8px;
  --shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* BG GRID */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}

/* HEADER */
.header {
  position: sticky; top:0; z-index:100;
  background: rgba(14,15,20,0.85);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 64px;
  gap: 24px;
}
.logo {
  display:flex; align-items:center; gap:10px;
  flex-shrink:0;
}
.logo-mark {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--red), #B03050);
  border-radius: 8px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:13px; letter-spacing:-0.5px;
  color:#fff;
}
.logo-text {
  font-size:13px; font-weight:600; color:var(--ink);
  line-height:1.2;
}
.logo-sub { font-size:10px; color:var(--ink3); font-weight:400; }

.header-divider { width:1px; height:28px; background:var(--border); flex-shrink:0; }

/* KPIs */
.header-kpis {
  display:flex; gap:32px; flex:1;
}
.kpi {
  display:flex; align-items:center; gap:8px;
}
.kpi-num {
  font-family:'DM Mono',monospace;
  font-size:22px; font-weight:500; color:var(--ink);
  letter-spacing:-1px;
}
.kpi-label { font-size:10px; color:var(--ink3); text-transform:uppercase; letter-spacing:.8px; }

/* NAV */
.nav {
  margin-left:auto; display:flex; gap:2px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
}
.nav-btn {
  border:none; background:transparent;
  font-family:'Sora',sans-serif; font-size:12px; font-weight:500;
  color:var(--ink3); cursor:pointer;
  padding:6px 14px; border-radius: 7px;
  transition: all .2s; white-space:nowrap;
}
.nav-btn:hover { color:var(--ink); background:var(--surface); }
.nav-btn.active { background:var(--surface2); color:var(--ink); }

/* MAIN */
.main { position:relative; z-index:1; padding:28px 32px 60px; max-width:1600px; margin:0 auto; }

/* SEARCH + FILTERS */
.toolbar { display:flex; gap:12px; margin-bottom:20px; align-items:center; }
.search-wrap { position:relative; flex:1; max-width:420px; }
.search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--ink3); pointer-events:none; }
.search-wrap input {
  width:100%; padding:10px 16px 10px 42px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius: var(--r-sm); color:var(--ink);
  font-family:'Sora',sans-serif; font-size:13px; outline:none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color:rgba(91,138,245,0.5); }
.search-wrap input::placeholder { color:var(--ink3); }

.filters { display:flex; gap:6px; flex-wrap:wrap; }
.chip {
  padding:6px 12px; border:1px solid var(--border);
  border-radius:100px; font-size:11.5px; font-weight:500;
  color:var(--ink3); background:var(--surface); cursor:pointer;
  transition:all .2s; display:flex; align-items:center; gap:5px;
  font-family:'Sora',sans-serif;
}
.chip:hover { border-color:var(--border2); color:var(--ink); }
.chip.active { border-color:var(--blue); background:var(--blue-dim); color:var(--blue); }
.chip .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* RESULTS */
.results-bar {
  font-size:12px; color:var(--ink3);
  margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.results-bar strong { color:var(--ink); }

/* ─── OVERVIEW ─── */
.ov-summary {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:20px 22px;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.stat-card.red::before { background:var(--red); }
.stat-card.blue::before { background:var(--blue); }
.stat-card.green::before { background:var(--green); }
.stat-num {
  font-family:'DM Mono',monospace; font-size:40px; font-weight:500;
  letter-spacing:-2px; line-height:1; margin-bottom:4px;
}
.stat-card.red .stat-num { color:var(--red); }
.stat-card.blue .stat-num { color:var(--blue); }
.stat-card.green .stat-num { color:var(--green); }
.stat-label { font-size:12px; color:var(--ink3); }
.stat-sub { font-size:11px; color:var(--ink3); margin-top:6px; opacity:.7; }

.section-title {
  font-size:10px; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--ink3); font-weight:600; margin-bottom:14px;
}

.ov-areas {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-bottom:32px;
}
.area-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:16px 18px;
  cursor:pointer; transition:all .25s;
  position:relative; overflow:hidden;
}
.area-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.area-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  opacity:.6;
}
.area-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.area-icon { font-size:18px; }
.area-count {
  font-family:'DM Mono',monospace; font-size:28px; font-weight:500; line-height:1; margin-bottom:3px;
}
.area-name { font-size:12px; color:var(--ink2); }
.area-bar { height:3px; background:var(--bg3); border-radius:100px; margin-top:12px; overflow:hidden; }
.area-bar-fill { height:100%; border-radius:100px; transition:width .6s cubic-bezier(.4,0,.2,1); }

.dir-chart {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:22px 24px;
}
.dir-row {
  display:flex; align-items:center; gap:12px;
  padding:7px 0; cursor:pointer; border-radius:6px;
  transition: background .15s; padding-left:8px;
}
.dir-row:hover { background:var(--bg3); }
.dir-name { font-size:12px; color:var(--ink2); width:210px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dir-track { flex:1; height:6px; background:var(--bg3); border-radius:100px; overflow:hidden; }
.dir-fill { height:100%; border-radius:100px; background:var(--red); transition:width .5s cubic-bezier(.4,0,.2,1); }
.dir-num { font-family:'DM Mono',monospace; font-size:12px; color:var(--ink3); width:28px; text-align:right; }

/* ─── CATALOGO ─── */
.cards-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px;
}
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:18px 20px;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
}
.card:hover { border-color:var(--border2); transform:translateY(-1px); box-shadow:0 8px 32px rgba(0,0,0,0.4); }
.card-accent { position:absolute; left:0; top:0; bottom:0; width:3px; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding-left:12px; }
.card-id { font-family:'DM Mono',monospace; font-size:10px; color:var(--ink3); }
.badge { font-size:10px; font-weight:600; padding:3px 9px; border-radius:100px; }
.card-title { font-size:14px; font-weight:600; margin-bottom:8px; padding-left:12px; line-height:1.4; }
.card-desc {
  font-size:12px; line-height:1.6; color:var(--ink2);
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  padding-left:12px;
}
.card-footer {
  margin-top:14px; padding-left:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.pill {
  font-size:10.5px; color:var(--ink3);
  background:var(--bg3); padding:3px 10px; border-radius:100px;
}
.card-note { font-size:10.5px; color:var(--ink3); margin-top:8px; padding-left:12px; font-style:italic; }

/* ─── DIREZIONI VIEW ─── */
.dir-cards {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px;
}
.dcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:20px 22px;
  cursor:pointer; transition:all .2s;
}
.dcard:hover { border-color:var(--border2); transform:translateY(-1px); }
.dcard-name { font-size:14px; font-weight:600; margin-bottom:4px; }
.dcard-total { font-size:12px; color:var(--ink3); margin-bottom:16px; }
.dcard-area-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.dcard-area-label { font-size:11px; color:var(--ink3); width:120px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dcard-area-track { flex:1; height:5px; background:var(--bg3); border-radius:100px; overflow:hidden; }
.dcard-area-fill { height:100%; border-radius:100px; }
.dcard-area-num { font-family:'DM Mono',monospace; font-size:10.5px; color:var(--ink3); width:20px; text-align:right; }

/* ─── HEATMAP ─── */
.hm-wrap { overflow-x:auto; }
.hm-table { border-collapse:collapse; font-size:11px; min-width:1000px; width:100%; }
.hm-table th {
  padding:6px 4px; color:var(--ink3); font-weight:500; font-size:10px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg2); z-index:10;
  text-align:center;
}
.hm-table th:first-child { text-align:left; min-width:180px; padding-right:16px; }
.hm-table th.rot {
  writing-mode:vertical-lr; transform:rotate(180deg);
  height:120px; white-space:nowrap; padding:6px 6px;
}
.hm-table td {
  padding:4px; text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.hm-table td:first-child { text-align:left; padding-right:16px; cursor:pointer; }
.hm-table tbody tr:hover td { background:rgba(255,255,255,0.03); }
.hm-cell {
  width:24px; height:24px; border-radius:4px;
  display:inline-flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:700;
}
.hm-cell.on { background:var(--red); color:#fff; }
.hm-cell.off { background:rgba(255,255,255,0.04); }
.hm-area-row td {
  font-size:10px; text-transform:uppercase; letter-spacing:1px;
  font-weight:600; padding:14px 4px 4px;
}

/* ─── DETAIL PANEL ─── */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  opacity:0; pointer-events:none;
  transition:opacity .3s;
}
.overlay.open { opacity:1; pointer-events:all; }

.panel {
  position:fixed; right:0; top:0; bottom:0;
  width:500px; max-width:95vw;
  background:var(--bg2); z-index:210;
  border-left:1px solid var(--border);
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
.panel.open { transform:translateX(0); }

.panel-header { padding:28px 28px 0; position:relative; }
.panel-close {
  position:absolute; right:20px; top:20px;
  width:32px; height:32px; border:none;
  background:var(--surface); border-radius:50%;
  cursor:pointer; color:var(--ink3); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; font-family:sans-serif;
}
.panel-close:hover { background:var(--surface2); color:var(--ink); }
.panel-id { font-family:'DM Mono',monospace; font-size:11px; color:var(--ink3); margin-bottom:8px; }
.panel-badge { display:inline-block; font-size:11px; font-weight:600; padding:4px 12px; border-radius:100px; margin-bottom:14px; }
.panel-title { font-size:22px; font-weight:700; line-height:1.3; margin-bottom:20px; letter-spacing:-.3px; }
.panel-desc { font-size:13.5px; line-height:1.7; color:var(--ink2); padding:0 28px; margin-bottom:28px; }
.panel-section { padding:0 28px; margin-bottom:24px; }
.panel-section-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink3); font-weight:600; margin-bottom:12px; }
.panel-tags { display:flex; flex-wrap:wrap; gap:6px; }
.panel-tag {
  font-size:11.5px; font-weight:500;
  padding:5px 12px; border-radius:100px;
  border:1px solid var(--border); color:var(--ink3);
  transition:all .2s;
}
.panel-tag.on { border-color:var(--red); background:var(--red-dim); color:var(--red); }
.panel-note {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:14px 16px;
  font-size:12.5px; color:var(--ink2); line-height:1.6;
}

/* EMPTY */
.empty { text-align:center; padding:80px 20px; color:var(--ink3); }
.empty-icon { font-size:36px; margin-bottom:12px; opacity:.4; }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.card, .area-card, .dcard, .stat-card {
  animation: fadeUp .35s ease both;
}

@media (max-width:768px) {
  .header { padding:0 16px; gap:12px; }
  .header-kpis { gap:16px; }
  .kpi-num { font-size:18px; }
  .main { padding:20px 16px 40px; }
  .ov-summary { grid-template-columns:1fr; }
  .cards-grid { grid-template-columns:1fr; }
  .dir-cards { grid-template-columns:1fr; }
}
</style>
</head>

// ── STATE ──
let view = 'overview', search = '', filterArea = null, filterDir = null;

// ── INIT ──
buildNav();
render();
document.getElementById('overlay').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

function buildNav() {
  const tabs = [{id:'overview',l:'Overview'},{id:'catalogo',l:'Catalogo'},{id:'direzioni',l:'Direzioni'},{id:'heatmap',l:'Matrice'}];
  document.getElementById('nav').innerHTML = tabs.map(t =>
    `<button class="nav-btn ${t.id===view?'active':''}" onclick="switchView('${t.id}')">${t.l}</button>`
  ).join('');
}

function switchView(v) {
  view=v; search=''; filterArea=null; filterDir=null;
  buildNav(); render();
}

function render() {
  const toolbar = document.getElementById('toolbar');
  const rb = document.getElementById('results-bar');
  const content = document.getElementById('content');
  toolbar.innerHTML=''; rb.innerHTML='';
  switch(view) {
    case 'overview':  renderOverview(content); break;
    case 'catalogo':  renderCatalogo(toolbar, rb, content); break;
    case 'direzioni': renderDirezioni(content); break;
    case 'heatmap':   renderHeatmap(content); break;
  }
}

// ── OVERVIEW ──
function renderOverview(el) {
  const cnt = {}; MACRO_AREE.forEach(a=>cnt[a]=0); DATA.forEach(d=>cnt[d.macro_area]++);
  const dirCnt = {}; DIREZIONI.forEach(d=>dirCnt[d]=0);
  DATA.forEach(d=>d.direzioni.forEach(dr=>dirCnt[dr]++));
  const maxD = Math.max(...Object.values(dirCnt));
  const trasv = DATA.filter(d=>d.direzioni.length===13).length;
  const spec = DATA.filter(d=>d.direzioni.length<=2).length;
  const avg = (DATA.reduce((s,d)=>s+d.direzioni.length,0)/DATA.length).toFixed(1);
  const maxArea = Math.max(...Object.values(cnt));

  el.innerHTML = `
    <div class="ov-summary">
      <div class="stat-card red" style="animation-delay:0ms">

        <div class="stat-label">Competenze trasversali</div>
        <div class="stat-sub">presenti in tutte le 13 direzioni</div>
      </div>
      <div class="stat-card blue" style="animation-delay:60ms">
        <div class="stat-num">${spec}</div>
        <div class="stat-label">Competenze specifiche</div>
        <div class="stat-sub">assegnate a ≤ 2 direzioni</div>
      </div>
      <div class="stat-card green" style="animation-delay:120ms">
        <div class="stat-num">${avg}</div>
        <div class="stat-label">Media direzioni / competenza</div>
        <div class="stat-sub">copertura media</div>
      </div>
    </div>

    <div class="section-title">Distribuzione per macro area</div>
    <div class="ov-areas">
      ${MACRO_AREE.map((a,i) => {
        const c = COLORS[a];
        const pct = (cnt[a]/maxArea*100).toFixed(0);
        return `<div class="area-card" onclick="goArea('${a}')" style="animation-delay:${i*40}ms">
          <div class="area-card-top">
            <div class="area-icon">${ICONS[a]}</div>
            <span style="font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace">${cnt[a]} comp.</span>
          </div>
          <div class="area-count" style="color:${c.accent}">${cnt[a]}</div>
          <div class="area-name">${a}</div>
          <div class="area-bar"><div class="area-bar-fill" style="width:${pct}%;background:${c.accent}"></div></div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Competenze per direzione</div>
    <div class="dir-chart">
      ${DIREZIONI.map((d,i) => `
        <div class="dir-row" onclick="goDir('${d}')" style="animation-delay:${i*30}ms">
          <div class="dir-name" title="${d}">${d}</div>
          <div class="dir-track"><div class="dir-fill" style="width:${(dirCnt[d]/maxD*100).toFixed(0)}%"></div></div>
          <div class="dir-num">${dirCnt[d]}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function goArea(a) { view='catalogo'; filterArea=a; filterDir=null; search=''; buildNav(); render(); }
function goDir(d)  { view='catalogo'; filterDir=d; filterArea=null; search=''; buildNav(); render(); }

// ── CATALOGO ──
function renderCatalogo(toolbar, rb, content) {
  toolbar.innerHTML = `
    <div style="margin-bottom:14px">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="si" type="text" placeholder="Cerca competenza..." value="${search}">
        </div>
      </div>
      <div class="filters">
        ${MACRO_AREE.map(a=>{
          const c=COLORS[a];
          return `<span class="chip ${filterArea===a?'active':''}" onclick="toggleArea('${a}')">
            <span class="dot" style="background:${c.accent}"></span>${a.replace('Competenze ','')}
          </span>`;
        }).join('')}
      </div>
      <div class="filters" style="margin-top:6px">
        ${DIREZIONI.map(d=>`<span class="chip ${filterDir===d?'active':''}" onclick="toggleDir('${d}')">${d}</span>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('si').addEventListener('input', e=>{search=e.target.value; updateCards(rb,content);});
  updateCards(rb, content);
}

function toggleArea(a){filterArea=filterArea===a?null:a; render();}
function toggleDir(d){filterDir=filterDir===d?null:d; render();}

function updateCards(rb, content) {
  let list = DATA;
  if(filterArea) list=list.filter(d=>d.macro_area===filterArea);
  if(filterDir)  list=list.filter(d=>d.direzioni.includes(filterDir));
  if(search.trim()){const q=search.toLowerCase();list=list.filter(d=>d.nome.toLowerCase().includes(q)||d.descrizione.toLowerCase().includes(q)||(d.note&&d.note.toLowerCase().includes(q)));}
  const parts=[]; if(filterArea)parts.push(filterArea); if(filterDir)parts.push(filterDir);
  rb.innerHTML=`<div class="results-bar"><strong>${list.length}</strong> competenz${list.length===1?'a':'e'}${parts.length?' — '+parts.join(' · '):''}`;
  if(!list.length){content.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>Nessuna competenza trovata</p></div>`;return;}
  content.innerHTML=`<div class="cards-grid">${list.map((d,i)=>{
    const c=COLORS[d.macro_area]||{accent:'#666',dim:'#333'};
    return `<div class="card" style="animation-delay:${Math.min(i,15)*25}ms" onclick="openPanel(${d.id})">
      <div class="card-accent" style="background:${c.accent}"></div>
      <div class="card-top">
        <span class="card-id">#${String(d.id).padStart(3,'0')}</span>
        <span class="badge" style="background:${c.dim};color:${c.accent}">${d.macro_area.replace('Competenze ','')}</span>
      </div>
      <div class="card-title">${d.nome}</div>
      <div class="card-desc">${d.descrizione}</div>
      <div class="card-footer">
        <span class="pill">${d.direzioni.length} direzion${d.direzioni.length===1?'e':'i'}</span>
        ${d.direzioni.length===13?`<span class="pill" style="color:var(--green);background:var(--green-dim)">Trasversale</span>`:''}
      </div>
      ${d.note?`<div class="card-note">${d.note}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

// ── DIREZIONI ──
function renderDirezioni(el) {
  const rows = DIREZIONI.map(dir=>{
    const comps=DATA.filter(d=>d.direzioni.includes(dir));
    const byArea={}; MACRO_AREE.forEach(a=>byArea[a]=0); comps.forEach(c=>byArea[c.macro_area]++);
    return{name:dir,total:comps.length,byArea};
  }).sort((a,b)=>b.total-a.total);
  el.innerHTML=`
    <div style="margin-bottom:20px">
      <div class="section-title">${rows.length} direzioni — ordinate per numero di competenze</div>
    </div>
    <div class="dir-cards">
      ${rows.map((d,i)=>`
        <div class="dcard" onclick="goDir('${d.name}')" style="animation-delay:${i*40}ms">
          <div class="dcard-name">${d.name}</div>
          <div class="dcard-total">${d.total} competenze</div>
          ${MACRO_AREE.filter(a=>d.byArea[a]>0).map(a=>{
            const c=COLORS[a];
            return`<div class="dcard-area-row">
              <div class="dcard-area-label">${a.replace('Competenze ','')}</div>
              <div class="dcard-area-track"><div class="dcard-area-fill" style="width:${(d.byArea[a]/d.total*100).toFixed(0)}%;background:${c.accent}"></div></div>
              <div class="dcard-area-num">${d.byArea[a]}</div>
            </div>`;
          }).join('')}
        </div>
      `).join('')}
    </div>`;
}

// ── HEATMAP ──
function renderHeatmap(el) {
  const grouped={};MACRO_AREE.forEach(a=>grouped[a]=[]);DATA.forEach(d=>grouped[d.macro_area].push(d));
  el.innerHTML=`
    <div class="section-title" style="margin-bottom:16px">Matrice competenze × direzioni (${DATA.length} × ${DIREZIONI.length})</div>
    <div class="hm-wrap">
      <table class="hm-table">
        <thead><tr>
          <th>Competenza</th>
          ${DIREZIONI.map(d=>`<th class="rot">${d}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${MACRO_AREE.map(area=>{
            const items=grouped[area];if(!items.length)return'';
            const c=COLORS[area];
            return`<tr class="hm-area-row"><td colspan="${DIREZIONI.length+1}" style="color:${c.accent}">${ICONS[area]} ${area} (${items.length})</td></tr>
            ${items.map(comp=>`
              <tr onclick="openPanel(${comp.id})" style="cursor:pointer">
                <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink2)" title="${comp.nome}">${comp.nome}</td>
                ${DIREZIONI.map(dir=>{const on=comp.direzioni.includes(dir);return`<td><div class="hm-cell ${on?'on':'off'}">${on?'✓':''}</div></td>`;}).join('')}
              </tr>`).join('')}`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── DETAIL PANEL ──
function openPanel(id) {
  const comp=DATA.find(d=>d.id===id); if(!comp)return;
  const c=COLORS[comp.macro_area]||{accent:'#666',dim:'#333'};
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-header">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-id">#${String(comp.id).padStart(3,'0')}</div>
      <div class="panel-badge" style="background:${c.dim};color:${c.accent}">${comp.macro_area}</div>
      <div class="panel-title">${comp.nome}</div>
    </div>
    <div class="panel-desc">${comp.descrizione}</div>
    <div class="panel-section">
      <div class="panel-section-title">Direzioni coinvolte (${comp.direzioni.length} / 13)</div>
      <div class="panel-tags">
        ${DIREZIONI.map(d=>`<span class="panel-tag ${comp.direzioni.includes(d)?'on':''}">${d}</span>`).join('')}
      </div>
    </div>
    ${comp.note?`<div class="panel-section"><div class="panel-section-title">Note</div><div class="panel-note">${comp.note}</div></div>`:''}
    <div style="height:40px"></div>
  `;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>
