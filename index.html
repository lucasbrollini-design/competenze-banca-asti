<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modello Competenze — Banca di Asti</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── SKILLVUE DESIGN SYSTEM TOKENS ─── */
:root {
  /* Brand */
  --primary:        #6769FF;
  --primary-hover:  #5557DD;
  --primary-light:  #EDEDFF;
  --primary-text:   #5557DD;

  /* Neutrals */
  --n900: #111827;
  --n700: #374151;
  --n500: #6B7280;
  --n400: #9CA3AF;
  --n300: #D1D5DB;
  --n200: #E5E7EB;
  --n100: #F3F4F6;
  --n50:  #F9FAFB;
  --n0:   #FFFFFF;

  /* Semantic */
  --info-bg:    #EFF6FF; --info-border:  #BFDBFE; --info-text:    #1D4ED8;
  --success-bg: #F0FDF4; --success-border:#BBF7D0; --success-text: #15803D;
  --warning-bg: #FFFBEB; --warning-border:#FDE68A; --warning-text: #B45309;
  --danger-bg:  #FEF2F2; --danger-border: #FECACA; --danger-text:  #B91C1C;

  /* Area colors — mapped to semantic palette */
  --c-normative:    #B91C1C; --c-normative-bg:    #FEF2F2;
  --c-informatiche: #1D4ED8; --c-informatiche-bg: #EFF6FF;
  --c-linguistiche: #15803D; --c-linguistiche-bg: #F0FDF4;
  --c-supporto:     #B45309; --c-supporto-bg:     #FFFBEB;
  --c-ruolo:        #5557DD; --c-ruolo-bg:        #EDEDFF;
  --c-soft:         #0369A1; --c-soft-bg:         #E0F2FE;
  --c-manageriali:  #7C3AED; --c-manageriali-bg:  #F5F3FF;

  /* Layout */
  --sidebar-w: 239px;
  --topbar-h:  56px;
  --radius-sm: 4px;
  --radius:    8px;
  --radius-lg: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: var(--n50);
  color: var(--n700);
  -webkit-font-smoothing: antialiased;
}

/* ─── TOPBAR ─── */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:100;
  height: var(--topbar-h);
  background: var(--n0);
  border-bottom: 1px solid var(--n200);
  display: flex; align-items: center;
  padding: 0 24px 0 0;
  gap: 0;
}
.topbar-logo {
  width: var(--sidebar-w);
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  border-right: 1px solid var(--n200);
  height: 100%;
  flex-shrink: 0;
}
.topbar-logo svg { flex-shrink: 0; }
.topbar-title {
  font-size: 13px; font-weight: 600; color: var(--n900);
  line-height: 1.2;
}
.topbar-sub { font-size: 11px; color: var(--n500); font-weight: 400; }

.topbar-kpis {
  display: flex; gap: 28px; padding: 0 24px; flex: 1;
}
.kpi { display: flex; align-items: center; gap: 8px; }
.kpi-num {
  font-size: 20px; font-weight: 700; color: var(--n900);
  letter-spacing: -0.5px;
}
.kpi-label { font-size: 11px; color: var(--n500); text-transform: uppercase; letter-spacing: .6px; font-weight: 500; }

.topbar-divider { width:1px; height:28px; background:var(--n200); flex-shrink:0; }

/* ─── SIDEBAR ─── */
.sidebar {
  position: fixed; left:0; top: var(--topbar-h); bottom:0;
  width: var(--sidebar-w);
  background: var(--n0);
  border-right: 1px solid var(--n200);
  display: flex; flex-direction: column;
  z-index: 50;
}
.sidebar-nav { flex: 1; padding: 12px 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  height: 40px; padding: 0 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px; font-weight: 500;
  color: var(--n700);
  transition: all .15s;
  border: none; background: transparent; width: 100%;
  text-align: left;
}
.nav-item svg { color: var(--n400); flex-shrink: 0; transition: color .15s; }
.nav-item:hover { background: var(--n50); }
.nav-item.active {
  background: var(--primary-light);
  color: var(--primary);
  border-left: 2px solid var(--primary);
  padding-left: 10px;
}
.nav-item.active svg { color: var(--primary); }

/* ─── MAIN CONTENT ─── */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--topbar-h);
  padding: 24px;
  max-width: calc(1280px + var(--sidebar-w));
  min-height: calc(100vh - var(--topbar-h));
}

/* ─── PAGE HEADER ─── */
.page-header {
  margin-bottom: 24px;
}
.page-title { font-size: 20px; font-weight: 600; color: var(--n900); margin-bottom: 4px; }
.page-sub   { font-size: 14px; color: var(--n500); }

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 12px; font-weight: 600; color: var(--n500);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px;
}

/* ─── STAT CARDS ─── */
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 32px; }
.stat-card {
  background: var(--n0); border: 1px solid var(--n200);
  border-radius: var(--radius-lg); padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.stat-num  { font-size: 36px; font-weight: 700; color: var(--n900); letter-spacing: -1.5px; line-height: 1; margin-bottom: 4px; }
.stat-label{ font-size: 13px; font-weight: 500; color: var(--n700); }
.stat-sub  { font-size: 12px; color: var(--n500); margin-top: 4px; }
.stat-card.accent .stat-num { color: var(--primary); }
.stat-card.success .stat-num { color: var(--success-text); }
.stat-card.info .stat-num { color: var(--info-text); }

/* ─── AREA CARDS GRID ─── */
.area-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 10px; margin-bottom: 32px;
}
.area-card {
  background: var(--n0); border: 1px solid var(--n200);
  border-radius: var(--radius-lg); padding: 16px 18px;
  cursor: pointer; transition: all .2s;
  box-shadow: var(--shadow-sm);
}
.area-card:hover { box-shadow: var(--shadow-md); border-color: var(--n300); transform: translateY(-1px); }
.area-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.area-icon { font-size:16px; }
.area-count-small { font-size:11px; color:var(--n500); font-weight:500; }
.area-count { font-size:28px; font-weight:700; color:var(--n900); line-height:1; margin-bottom:3px; }
.area-name  { font-size:12px; color:var(--n500); }
.area-bar   { height:3px; background:var(--n100); border-radius:100px; margin-top:12px; overflow:hidden; }
.area-bar-fill { height:100%; border-radius:100px; transition:width .5s cubic-bezier(.4,0,.2,1); }

/* ─── DIR CHART CARD ─── */
.chart-card {
  background: var(--n0); border: 1px solid var(--n200);
  border-radius: var(--radius-lg); padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}
.dir-row {
  display:flex; align-items:center; gap:12px;
  padding: 6px 8px; border-radius: var(--radius-sm);
  cursor:pointer; transition: background .15s;
}
.dir-row:hover { background: var(--n50); }
.dir-name { font-size:13px; color:var(--n700); width:220px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dir-track { flex:1; height:6px; background:var(--n100); border-radius:100px; overflow:hidden; }
.dir-fill  { height:100%; border-radius:100px; background:var(--primary); transition:width .5s; }
.dir-num   { font-size:12px; font-weight:600; color:var(--n500); width:28px; text-align:right; }

/* ─── SEARCH + FILTERS ─── */
.toolbar { display:flex; gap:10px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
.search-wrap { position:relative; flex:1; max-width:400px; }
.search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--n400); pointer-events:none; }
.search-wrap input {
  width:100%; height:40px; padding:0 12px 0 38px;
  border: 1.5px solid var(--n300); border-radius: var(--radius);
  font-family:'Inter',sans-serif; font-size:14px; color:var(--n900);
  background:var(--n0); outline:none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.search-wrap input::placeholder { color: var(--n400); }

.filters { display:flex; gap:6px; flex-wrap:wrap; }
.chip {
  height:28px; padding:0 12px;
  border: 1px solid var(--n200); border-radius:100px;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  color:var(--n500); background:var(--n0); cursor:pointer;
  transition:all .15s; display:flex; align-items:center; gap:5px;
}
.chip:hover { border-color:var(--n300); color:var(--n700); }
.chip.active { border-color:var(--primary); background:var(--primary-light); color:var(--primary-text); }
.chip .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* ─── RESULTS BAR ─── */
.results-bar { font-size:13px; color:var(--n500); margin-bottom:14px; }
.results-bar strong { color:var(--n900); font-weight:600; }

/* ─── COMPETENCY CARDS ─── */
.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; }
.card {
  background:var(--n0); border:1px solid var(--n200);
  border-radius:var(--radius-lg); padding:18px 20px;
  cursor:pointer; transition:all .2s;
  box-shadow:var(--shadow-sm);
  position:relative; overflow:hidden;
}
.card:hover { box-shadow:var(--shadow-md); border-color:var(--n300); transform:translateY(-1px); }
.card-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; padding-left:12px; }
.card-id   { font-size:11px; font-weight:600; color:var(--n400); letter-spacing:.3px; }
.badge {
  font-size:11px; font-weight:600;
  padding:3px 8px; border-radius:100px;
  white-space:nowrap;
}
.card-title { font-size:14px; font-weight:600; color:var(--n900); margin-bottom:6px; padding-left:12px; line-height:1.4; }
.card-desc  {
  font-size:13px; line-height:1.55; color:var(--n500);
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  padding-left:12px;
}
.card-footer { margin-top:12px; padding-left:12px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.pill {
  font-size:11px; font-weight:500; color:var(--n500);
  background:var(--n100); padding:3px 9px; border-radius:100px;
}
.pill.accent { background:var(--primary-light); color:var(--primary-text); }
.card-note { font-size:11px; color:var(--n400); margin-top:6px; padding-left:12px; font-style:italic; }

/* ─── DIREZIONI CARDS ─── */
.dir-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }
.dcard {
  background:var(--n0); border:1px solid var(--n200);
  border-radius:var(--radius-lg); padding:20px 22px;
  cursor:pointer; transition:all .2s; box-shadow:var(--shadow-sm);
}
.dcard:hover { box-shadow:var(--shadow-md); border-color:var(--n300); }
.dcard-name  { font-size:14px; font-weight:600; color:var(--n900); margin-bottom:3px; }
.dcard-total { font-size:12px; color:var(--n500); margin-bottom:14px; }
.dcard-area-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.dcard-area-label { font-size:11px; color:var(--n500); width:110px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dcard-area-track { flex:1; height:4px; background:var(--n100); border-radius:100px; overflow:hidden; }
.dcard-area-fill  { height:100%; border-radius:100px; }
.dcard-area-num   { font-size:11px; font-weight:600; color:var(--n500); width:20px; text-align:right; }

/* ─── HEATMAP ─── */
.hm-wrap { overflow-x:auto; background:var(--n0); border:1px solid var(--n200); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
.hm-table { border-collapse:collapse; font-size:11px; min-width:1000px; width:100%; }
.hm-table th {
  padding:6px 4px; color:var(--n500); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:.5px;
  border-bottom:1px solid var(--n200); background:var(--n100);
  position:sticky; top:0; z-index:10; text-align:center;
}
.hm-table th:first-child { text-align:left; min-width:180px; padding:6px 16px 6px 16px; }
.hm-table th.rot {
  writing-mode:vertical-lr; transform:rotate(180deg);
  height:130px; white-space:nowrap; padding:8px 6px;
}
.hm-table td {
  padding:4px; text-align:center;
  border-bottom:1px solid var(--n100);
}
.hm-table td:first-child { text-align:left; padding:4px 16px; cursor:pointer; }
.hm-table tbody tr:hover td { background:var(--n50); }
.hm-cell {
  width:24px; height:24px; border-radius:var(--radius-sm);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700;
}
.hm-cell.on  { background:var(--primary); color:#fff; }
.hm-cell.off { background:var(--n100); color:var(--n400); }
.hm-area-row td {
  font-size:10px; text-transform:uppercase; letter-spacing:1px;
  font-weight:700; padding:14px 16px 6px;
  background:var(--n50);
}

/* ─── DETAIL PANEL ─── */
.overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.4);
  opacity:0; pointer-events:none;
  transition:opacity .3s;
}
.overlay.open { opacity:1; pointer-events:all; }
.panel {
  position:fixed; right:0; top:0; bottom:0;
  width:520px; max-width:95vw;
  background:var(--n0); z-index:210;
  border-left:1px solid var(--n200);
  box-shadow: var(--shadow-md);
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
.panel.open { transform:translateX(0); }
.panel-header { padding:24px 24px 0; position:relative; }
.panel-close {
  position:absolute; right:16px; top:16px;
  width:32px; height:32px; border:1px solid var(--n200);
  background:var(--n0); border-radius:50%;
  cursor:pointer; color:var(--n500); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; font-family:sans-serif;
}
.panel-close:hover { background:var(--n100); color:var(--n900); }
.panel-id    { font-size:11px; font-weight:600; color:var(--n400); letter-spacing:.5px; margin-bottom:8px; }
.panel-badge { display:inline-block; font-size:11px; font-weight:600; padding:4px 10px; border-radius:100px; margin-bottom:12px; }
.panel-title { font-size:20px; font-weight:700; color:var(--n900); line-height:1.3; margin-bottom:16px; }
.panel-desc  { font-size:14px; line-height:1.65; color:var(--n700); padding:0 24px; margin-bottom:24px; }
.panel-section { padding:0 24px; margin-bottom:20px; }
.panel-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--n400); margin-bottom:10px; }
.panel-tags  { display:flex; flex-wrap:wrap; gap:6px; }
.panel-tag {
  font-size:12px; font-weight:500; padding:5px 12px; border-radius:100px;
  border:1px solid var(--n200); color:var(--n500); background:var(--n0);
}
.panel-tag.on { border-color:var(--primary); background:var(--primary-light); color:var(--primary-text); }
.panel-note {
  background:var(--n50); border:1px solid var(--n200);
  border-radius:var(--radius); padding:12px 14px;
  font-size:13px; color:var(--n700); line-height:1.5;
}

/* ─── EMPTY STATE ─── */
.empty { text-align:center; padding:60px 20px; color:var(--n400); }
.empty-icon { font-size:32px; margin-bottom:10px; opacity:.5; }
.empty p    { font-size:14px; }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.card, .area-card, .dcard, .stat-card { animation: fadeUp .3s ease both; }

/* ─── RESPONSIVE ─── */
@media (max-width:768px) {
  .sidebar { display:none; }
  .main { margin-left:0; padding:16px; }
  .stat-grid { grid-template-columns:1fr; }
  .cards-grid { grid-template-columns:1fr; }
  .dir-cards  { grid-template-columns:1fr; }
  .topbar-logo { width:auto; border-right:none; }
  .topbar-kpis { display:none; }
}
</style>
</head>

ione","Servizio Affari Legali e Societari","Servizio Canali Diretti e Comunicazione","Direzione Operativa","Direzione Risorse"]},{"id":10,"nome":"Reportistica e rendicontazione","descrizione":"Capacità di relazionare e rendicontare agli uffici interni dedicati le informazioni tecniche necessarie in merito alle attività svolte.","macro_area":"Competenze di supporto","note":"Tutti tranne i Responsabili di Direzione/Servizio","direzioni":["Rete Territoriale","Direzione Commerciale","Direzione Finanza","Servizio Compliance","Servizio Revisione Interna","Servizio Risk Management","Direzione Crediti","Direzione Crediti Deteriorati","Servizio Bilancio e Pianificazione","Servizio Affari Legali e Societari","Servizio Canali Diretti e Comunicazione","Direzione Operativa","Direzione Risorse"]},{"id":11,"nome":"Monitoraggio processi e procedure","descrizione":"Capacità di effettuare un monitoraggio continuo delle attività aziendali in ottica di individuare anomalie o situazioni di rischio nei processi e procedure, su cui prevedere interventi di miglioramento.","macro_area":"Competenze di ruolo","note":"Per le funzioni in cui è presente una figura o un ufficio che implementa processi di monitoraggio e controllo continuo.","direzioni":["Rete Territoriale","Direzione Commerciale","Servizio Compliance","Servizio Revisione Interna","Servizio Risk Management","Direzione Crediti","Direzione Crediti Deteriorati","Servizio Bilancio e Pianificazione","Direzione Operativa","Direzione Risorse"]},{"id":12,"nome":"Prevenzione del rischio operativo e reputazionale","descrizione":"Capacità di riconoscere e intervenire sui segnali di rischio operativo e prevenire possibili impatti negativi sull'immagine e reputazione della Banca.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Rete Territoriale","Servizio Compliance"]},{"id":13,"nome":"Analisi del merito creditizio","descrizione":"Capacità di analizzare e interpretare bilanci aziendali, dichiarazioni dei redditi e/o altre document rizione":"Capacità di gestire le aste di compravendita dei titoli di Stato ed i collocamenti azionari ed obbligazionari per conto della clientela.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":55,"nome":"Quotazioni sistemi trading venue","descrizione":"Capacità di rilevare, analizzare e confrontare le quotazioni dei titoli sui sistemi di trading regolamentati.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":56,"nome":"Internalizzatore Sistematico","descrizione":"Capacità di trattare azioni e obbligazioni dei clienti per proprio conto, senza passare attraverso una borsa o altro sistema di trading regolamentato.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":57,"nome":"Gestione Tesoreria","descrizione":"Capacità di gestire efficacemente la liquidità della Banca nel rispetto delle linee di credito disponibili e delle programmazioni aziendali del budget.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":58,"nome":"Funding e investimenti finanziari di proprietà","descrizione":"Capacità di elaborare proposte per gli investimenti del portafoglio di proprietà e gestire le attività di funding sui mercati finanziari e interbancari.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":59,"nome":"Gestione del rischio finanziario","descrizione":"Capacità di gestione delle attività in ottica di allineamento al rischio proposto nel RAS aziendale, di gestione del rischio sul mercato dei cambi.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":60,"nome":"Creazione portafogli modello","descrizione":"Capacità di predisporre portafogli modello per i clienti sulla base di diversi profili di rischio e delle richieste di diversificazione.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":61,"nome":"Valutazione strumenti finanziari","descrizione":"Capacità di valutare e selezionare gli strumenti finanziari (azioni, obbligazioni, ETF, fondi comuni, ecc.) per identificare quelli più adatti.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":62,"nome":"Monitoraggio portafogli patrimoniali","descrizione":"Capacità di monitorare i portafogli clienti sulla base degli andamenti di mercato e dei cambiamenti nelle condizioni economiche.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Direzione Finanza"]},{"id":63,"nome":"Analisi applicabilità normativa","descrizione":"Capacità di identificare e approfondire le norme applicabili alla Banca e al Gruppo rispetto alle attività connesse al proprio ufficio.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Servizio Compliance"]},{"id":64,"nome":"Verifica di idoneità ex ante","descrizione":"Capacità di verificare in via preventiva l'idoneità e l'adeguatezza delle procedure interne ed assicurare il rispetto della normativa di riferimento.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Servizio Compliance"]},{"id":65,"nome":"Verifica operatività ex post","descrizione":"Capacità di verificare l'efficacia del processo di idoneità e la corretta applicazione delle procedure interne e dell'operatività.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Servizio Compliance"]},{"id":66,"nome":"Verifica idoneità e operatività della Rete","descrizione":"Capacità di compiere controlli sulla rete territoriale di filiali per valutare la conformità operativa e individuare profili di rischio.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Servizio Compliance","Servizio Revisione Interna"]},{"id":67,"nome":"Assistenza e gestione reclami clienti","descrizione":"Capacità di fornire assistenza specializzata ai clienti in seguito a una segnalazione di disservizio o reclamo.","macro_area":"Competenze di ruolo","note":null,"direzioni":["Servizio Compliance"]},{" let view='overview', search='', filterArea=null, filterDir=null;

// INIT
buildSidebar();
render();
document.getElementById('overlay').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

function buildSidebar() {
  document.getElementById('sidebar-nav').innerHTML = NAV_ITEMS.map(item => `
    <button class="nav-item ${item.id===view?'active':''}" onclick="switchView('${item.id}')">
      ${item.icon}
      ${item.label}
    </button>
  `).join('');
}

function switchView(v) {
  view=v; search=''; filterArea=null; filterDir=null;
  buildSidebar(); render();
}

function render() {
  const toolbar = document.getElementById('toolbar');
  const rb = document.getElementById('results-bar');
  const content = document.getElementById('content');
  toolbar.innerHTML=''; rb.innerHTML='';
  switch(view) {
    case 'overview':  renderOverview(content); break;
    case 'catalogo':  renderCatalogo(toolbar, rb, content); break;
    case 'direzioni': renderDirezioni(content); break;
    case 'heatmap':   renderHeatmap(content); break;
  }
}

// ── OVERVIEW ──
function renderOverview(el) {
  const cnt={}; MACRO_AREE.forEach(a=>cnt[a]=0); DATA.forEach(d=>cnt[d.macro_area]++);
  const dirCnt={}; DIREZIONI.forEach(d=>dirCnt[d]=0);
  DATA.forEach(d=>d.direzioni.forEach(dr=>dirCnt[dr]++));
  const maxD=Math.max(...Object.values(dirCnt));
  const trasv=DATA.filter(d=>d.direzioni.length===13).length;
  const spec=DATA.filter(d=>d.direzioni.length<=2).length;
  const avg=(DATA.reduce((s,d)=>s+d.direzioni.length,0)/DATA.length).toFixed(1);
  const maxArea=Math.max(...Object.values(cnt));

  el.innerHTML=`
    <div class="page-header">
      <div class="page-title">Overview</div>
      <div class="page-sub">Distribuzione delle competenze per macro area e direzione</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card accent" style="animation-delay:0ms">
        <div class="stat-num">${trasv}</div>
        <div class="stat-label">Competenze trasversali</div>
        <div class="stat-sub">presenti in tutte le 13 direzioni</div>
      </div>
      <div class="stat-card success" style="animation-delay:60ms">
        <div class="stat-num">${spec}</div>
        <div class="stat-label">Competenze specifiche</div>
        <div class="stat-sub">assegnate a ≤ 2 direzioni</div>
      </div>
      <div class="stat-card info" style="animation-delay:120ms">
        <div class="stat-num">${avg}</div>
        <div class="stat-label">Media direzioni / competenza</div>
        <div class="stat-sub">copertura media</div>
      </div>
    </div>

    <div class="section-label">Distribuzione per macro area</div>
    <div class="area-grid">
      ${MACRO_AREE.map((a,i)=>{
        const s=AREA_STYLE[a];
        const pct=(cnt[a]/maxArea*100).toFixed(0);
        return `<div class="area-card" onclick="goArea('${a}')" style="animation-delay:${i*40}ms">
          <div class="area-card-top">
            <span style="font-size:15px">${ICONS[a]}</span>
            <span class="area-count-small">${cnt[a]} comp.</span>
          </div>
          <div class="area-count" style="color:${s.fg}">${cnt[a]}</div>
          <div class="area-name">${a}</div>
          <div class="area-bar"><div class="area-bar-fill" style="width:${pct}%;background:${s.fg}"></div></div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-label">Competenze per direzione</div>
    <div class="chart-card">
      ${DIREZIONI.map((d,i)=>`
        <div class="dir-row" onclick="goDir('${d}')" style="animation-delay:${i*25}ms">
          <div class="dir-name" title="${d}">${d}</div>
          <div class="dir-track"><div class="dir-fill" style="width:${(dirCnt[d]/maxD*100).toFixed(0)}%"></div></div>
          <div class="dir-num">${dirCnt[d]}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function goArea(a){view='catalogo';filterArea=a;filterDir=null;search='';buildSidebar();render();}
function goDir(d){view='catalogo';filterDir=d;filterArea=null;search='';buildSidebar();render();}

// ── CATALOGO ──
function renderCatalogo(toolbar,rb,content){
  toolbar.innerHTML=`
    <div style="margin-bottom:14px">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="si" type="text" placeholder="Cerca competenza per nome o descrizione..." value="${search}">
        </div>
      </div>
      <div class="filters">
        ${MACRO_AREE.map(a=>{
          const s=AREA_STYLE[a];
          return `<span class="chip ${filterArea===a?'active':''}" onclick="toggleArea('${a}')" style="${filterArea===a?`border-color:${s.fg};background:${s.bg};color:${s.fg}`:''}">
            <span class="dot" style="background:${s.fg}"></span>${a.replace('Competenze ','')}
          </span>`;
        }).join('')}
      </div>
      <div class="filters" style="margin-top:8px">
        ${DIREZIONI.map(d=>`<span class="chip ${filterDir===d?'active':''}" onclick="toggleDir('${d}')">${d}</span>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('si').addEventListener('input',e=>{search=e.target.value;updateCards(rb,content);});
  updateCards(rb,content);
}

function toggleArea(a){filterArea=filterArea===a?null:a;render();}
function toggleDir(d){filterDir=filterDir===d?null:d;render();}

function updateCards(rb,content){
  let list=DATA;
  if(filterArea) list=list.filter(d=>d.macro_area===filterArea);
  if(filterDir)  list=list.filter(d=>d.direzioni.includes(filterDir));
  if(search.trim()){const q=search.toLowerCase();list=list.filter(d=>d.nome.toLowerCase().includes(q)||d.descrizione.toLowerCase().includes(q)||(d.note&&d.note.toLowerCase().includes(q)));}
  const parts=[]; if(filterArea)parts.push(filterArea); if(filterDir)parts.push(filterDir);
  rb.innerHTML=`<div class="results-bar"><strong>${list.length}</strong> competenz${list.length===1?'a':'e'}${parts.length?' — '+parts.join(' · '):''}`;
  if(!list.length){content.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>Nessuna competenza trovata</p></div>`;return;}
  content.innerHTML=`<div class="cards-grid">${list.map((d,i)=>{
    const s=AREA_STYLE[d.macro_area]||{fg:'#6B7280',bg:'#F3F4F6'};
    return `<div class="card" style="animation-delay:${Math.min(i,15)*25}ms" onclick="openPanel(${d.id})">
      <div class="card-accent" style="background:${s.fg}"></div>
      <div class="card-top">
        <span class="card-id">#${String(d.id).padStart(3,'0')}</span>
        <span class="badge" style="background:${s.bg};color:${s.fg}">${d.macro_area.replace('Competenze ','')}</span>
      </div>
      <div class="card-title">${d.nome}</div>
      <div class="card-desc">${d.descrizione}</div>
      <div class="card-footer">
        <span class="pill">${d.direzioni.length} direzion${d.direzioni.length===1?'e':'i'}</span>
        ${d.direzioni.length===13?`<span class="pill accent">Trasversale</span>`:''}
      </div>
      ${d.note?`<div class="card-note">${d.note}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

// ── DIREZIONI ──
function renderDirezioni(el){
  const rows=DIREZIONI.map(dir=>{
    const comps=DATA.filter(d=>d.direzioni.includes(dir));
    const byArea={}; MACRO_AREE.forEach(a=>byArea[a]=0); comps.forEach(c=>byArea[c.macro_area]++);
    return{name:dir,total:comps.length,byArea};
  }).sort((a,b)=>b.total-a.total);
  el.innerHTML=`
    <div class="page-header">
      <div class="page-title">Competenze per direzione</div>
      <div class="page-sub">${rows.length} direzioni — ordinate per numero di competenze</div>
    </div>
    <div class="dir-cards">
      ${rows.map((d,i)=>`
        <div class="dcard" onclick="goDir('${d.name}')" style="animation-delay:${i*40}ms">
          <div class="dcard-name">${d.name}</div>
          <div class="dcard-total">${d.total} competenze</div>
          ${MACRO_AREE.filter(a=>d.byArea[a]>0).map(a=>{
            const s=AREA_STYLE[a];
            return`<div class="dcard-area-row">
              <div class="dcard-area-label">${a.replace('Competenze ','')}</div>
              <div class="dcard-area-track"><div class="dcard-area-fill" style="width:${(d.byArea[a]/d.total*100).toFixed(0)}%;background:${s.fg}"></div></div>
              <div class="dcard-area-num">${d.byArea[a]}</div>
            </div>`;
          }).join('')}
        </div>
      `).join('')}
    </div>`;
}

// ── HEATMAP ──
function renderHeatmap(el){
  const grouped={};MACRO_AREE.forEach(a=>grouped[a]=[]);DATA.forEach(d=>grouped[d.macro_area].push(d));
  el.innerHTML=`
    <div class="page-header">
      <div class="page-title">Matrice competenze × direzioni</div>
      <div class="page-sub">${DATA.length} competenze · ${DIREZIONI.length} direzioni</div>
    </div>
    <div class="hm-wrap">
      <table class="hm-table">
        <thead><tr>
          <th>Competenza</th>
          ${DIREZIONI.map(d=>`<th class="rot">${d}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${MACRO_AREE.map(area=>{
            const items=grouped[area];if(!items.length)return'';
            const s=AREA_STYLE[area];
            return`<tr class="hm-area-row"><td colspan="${DIREZIONI.length+1}" style="color:${s.fg}">${ICONS[area]} ${area} (${items.length})</td></tr>
            ${items.map(comp=>`
              <tr onclick="openPanel(${comp.id})" style="cursor:pointer">
                <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--n900);font-weight:500" title="${comp.nome}">${comp.nome}</td>
                ${DIREZIONI.map(dir=>{const on=comp.direzioni.includes(dir);return`<td><div class="hm-cell ${on?'on':'off'}">${on?'✓':''}</div></td>`;}).join('')}
              </tr>`).join('')}`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── DETAIL PANEL ──
function openPanel(id){
  const comp=DATA.find(d=>d.id===id);if(!comp)return;
  const s=AREA_STYLE[comp.macro_area]||{fg:'#6B7280',bg:'#F3F4F6'};
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-header">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-id">#${String(comp.id).padStart(3,'0')}</div>
      <div class="panel-badge" style="background:${s.bg};color:${s.fg}">${comp.macro_area}</div>
      <div class="panel-title">${comp.nome}</div>
    </div>
    <div class="panel-desc">${comp.descrizione}</div>
    <div class="panel-section">
      <div class="panel-section-title">Direzioni coinvolte (${comp.direzioni.length} / 13)</div>
      <div class="panel-tags">
        ${DIREZIONI.map(d=>`<span class="panel-tag ${comp.direzioni.includes(d)?'on':''}">${d}</span>`).join('')}
      </div>
    </div>
    ${comp.note?`<div class="panel-section"><div class="panel-section-title">Note</div><div class="panel-note">${comp.note}</div></div>`:''}
    <div style="height:40px"></div>
  `;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>
